repos:
  - repo: local
    hooks:
      - id: gazelle
        name: gazelle
        language: system
        entry: bazel run //:gazelle
        pass_filenames: false
        files: \.go$

      - id: check-go-work
        name: check go.work consistency
        language: python
        entry: python meta/scripts/check_go_work.py
        pass_filenames: false
        files: go\.(mod|work)$

      - id: check-python-scale
        name: check Python target scale
        language: python
        entry: python meta/scripts/check_python_scale.py
        pass_filenames: false
        files: BUILD\.bazel$

      - id: bazel-mod-tidy
        name: bazel mod tidy
        language: system
        entry: bazel mod tidy
        pass_filenames: false
        files: go\.(mod|work|sum)$
