repos:
  - repo: local
    hooks:
      - id: gazelle
        name: gazelle
        language: system
        entry: bazel run //:gazelle
        pass_filenames: false
        files: \.go$

      - id: gazelle-update-repos
        name: gazelle update-repos
        language: system
        entry: bazel run //:gazelle-update-repos
        pass_filenames: false
        files: go\.(mod|work|sum)$
