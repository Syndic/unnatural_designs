name: Commit files via GitHub App
description: >-
  Commits one or more file changes to the current PR branch using the GraphQL
  `createCommitOnBranch` mutation, authenticated with a GitHub App installation
  token. Web-flow signing is automatic with this mutation, and the resulting
  push event is attributed to the app rather than `github-actions[bot]` so
  downstream workflows retrigger normally. Files with no diff are skipped; if
  none of the listed files changed, the whole step is a clean no-op.

inputs:
  app-id:
    description: GitHub App ID whose installation will mint the commit token.
    required: true
  private-key:
    description: GitHub App private key (PEM).
    required: true
  branch:
    description: Branch name to commit to (typically `github.head_ref`).
    required: true
  file-paths:
    description: >-
      Newline-separated list of file paths to commit (relative to repo root).
      Each path is independently diff-checked; only changed files end up in the
      mutation's `fileChanges.additions`.
    required: true
  commit-message:
    description: Commit message headline.
    required: true

runs:
  using: composite
  steps:
    - id: app-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}

    - id: diff
      shell: bash
      env:
        FILE_PATHS: ${{ inputs.file-paths }}
      run: |
        set -euo pipefail
        CHANGED=""
        while IFS= read -r path; do
          [ -z "${path}" ] && continue
          if ! git diff --quiet -- "${path}"; then
            CHANGED+="${path}"$'\n'
          fi
        done <<< "${FILE_PATHS}"
        {
          echo "changed-paths<<EOF"
          printf "%s" "${CHANGED}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - if: steps.diff.outputs.changed-paths != ''
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        REPO: ${{ github.repository }}
        BRANCH: ${{ inputs.branch }}
        CHANGED_PATHS: ${{ steps.diff.outputs.changed-paths }}
        MESSAGE: ${{ inputs.commit-message }}
      run: |
        set -euo pipefail

        # Read the tip from the remote (not local HEAD) so a fast-follow push between
        # our checkout and this call causes a clean mutation rejection rather than a
        # silent overwrite.
        OID=$(gh api "repos/${REPO}/git/ref/heads/${BRANCH}" --jq .object.sha)

        # Build the FileAddition[] for the mutation as a stream of `{path, contents}`
        # objects written to a tempfile. The final jq call below reads them back with
        # --slurpfile, which puts them into an array.
        #
        # We pass the file contents to jq via `--rawfile` (which reads from disk) rather
        # than as a `--arg` argv string. Both jq calls — the per-file one that builds an
        # addition object, and the outer one that assembles the request body — need this:
        # base64-encoded contents of a single ~150 KB file are large enough that argv
        # passing blew through the kernel's ARG_MAX on a real MODULE.bazel.lock commit,
        # surfacing as `jq: Argument list too long`. File-based passing has no such bound.
        ADDITIONS_FILE=$(mktemp)
        trap 'rm -f "${ADDITIONS_FILE}"' EXIT
        while IFS= read -r path; do
          [ -z "${path}" ] && continue
          CONTENTS_FILE=$(mktemp)
          base64 -w0 < "${path}" > "${CONTENTS_FILE}"
          jq -n --arg path "${path}" --rawfile contents "${CONTENTS_FILE}" \
            '{path: $path, contents: $contents}' >> "${ADDITIONS_FILE}"
          rm -f "${CONTENTS_FILE}"
        done <<< "${CHANGED_PATHS}"

        # `gh api graphql -F` does not parse JSON values for non-scalar GraphQL
        # variables, so build the full request body ourselves and POST it via
        # `--input -`. This is the only way to pass `additions: [FileAddition!]!`
        # cleanly.
        jq -n \
          --arg query '
            mutation(
              $repo: String!,
              $branch: String!,
              $oid: GitObjectID!,
              $additions: [FileAddition!]!,
              $message: String!
            ) {
              createCommitOnBranch(input: {
                branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                expectedHeadOid: $oid,
                fileChanges: { additions: $additions },
                message: { headline: $message }
              }) { commit { url } }
            }' \
          --arg repo "${REPO}" \
          --arg branch "${BRANCH}" \
          --arg oid "${OID}" \
          --slurpfile additions "${ADDITIONS_FILE}" \
          --arg message "${MESSAGE}" \
          '{
            query: $query,
            variables: {
              repo: $repo,
              branch: $branch,
              oid: $oid,
              additions: $additions,
              message: $message
            }
          }' | gh api graphql --input -
