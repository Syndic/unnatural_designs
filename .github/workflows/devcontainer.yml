name: Devcontainer

# Build the devcontainer and smoke-test the toolchain it ships. Catches breakage from
# Renovate-driven bumps to the Debian base, the `features` block (go/python/etc.), or
# BAZELISK_VERSION before someone hits it locally.
# The workflow always runs so the status check always reports — a trigger-level `paths:`
# filter would skip the workflow entirely on unrelated PRs, leaving a required check
# permanently pending. Path filtering happens inside the job instead.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-smoke-test:
    name: Build devcontainer and smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history back to the PR base / previous push so we can diff for changed paths.
          fetch-depth: 0

      - id: changes
        name: Detect devcontainer changes
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          # Zero SHA = branch-creation push with no prior commit to diff against; treat as changed.
          if [[ "$base" =~ ^0+$ ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$base...HEAD" \
              | grep -Eq '^\.devcontainer/|^\.github/workflows/devcontainer\.yml$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # devcontainers/ci builds with the full feature set (so feature bumps are exercised,
      # not just the Dockerfile) and runs the smoke command inside the resulting container.
      # `push: never` keeps this self-contained — no registry or credentials needed.
      - if: steps.changes.outputs.changed == 'true'
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3
        with:
          push: never
          # `bazel --version` exercises the full Bazelisk chain: download from the URL
          # baked into BAZELISK_VERSION, then bootstrap Bazel per .bazelversion. The
          # toolchain feature smoke tests (`go version`, `python3 --version`) confirm
          # the `features` block landed both interpreters on PATH.
          runCmd: |
            set -euo pipefail
            bazel --version
            go version
            python3 --version

      - if: steps.changes.outputs.changed != 'true'
        run: echo "No devcontainer changes in this PR; skipping build."
