name: Renovate — re-export requirements_lock.txt

# Renovate's pep621 manager updates pyproject.toml and uv.lock together in a single PR
# commit, but does not run the `uv export` step that produces requirements_lock.txt (uv.lock is
# the source of truth; requirements_lock.txt is the requirements.txt-format projection that
# rules_python's `pip.parse` consumes — see MODULE.bazel for the chain). On human PRs the
# pre-commit hook keeps the export fresh; on Renovate PRs there is no human pre-commit step,
# so this workflow plays the same role. The `commit-file-via-app` composite action handles
# the signing + retrigger plumbing — see .github/actions/commit-file-via-app/action.yml and
# docs/future-considerations.md "Auto-commit GitHub App" for the rationale.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - "uv.lock"
      - "pyproject.toml"
      - "requirements_lock.txt"

permissions:
  contents: read

jobs:
  re-export:
    name: Re-export requirements_lock.txt
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Re-export requirements_lock.txt
        run: |
          uv export --format requirements-txt --no-emit-project \
            --output-file requirements_lock.txt

      - uses: ./.github/actions/commit-file-via-app
        with:
          app-id: ${{ vars.RENOVATE_HELPER_APP_ID }}
          private-key: ${{ secrets.RENOVATE_HELPER_PRIVATE_KEY }}
          branch: ${{ github.head_ref }}
          file-path: requirements_lock.txt
          commit-message: "chore(deps): re-export requirements_lock.txt"
