name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 02:00 UTC
    - cron: '0 2 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: python
            build-mode: none

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # CodeQL requires a fresh, untraced build for Go — caching must be disabled
      # so CodeQL can observe the compilation. --config=remote is intentionally
      # omitted here for the same reason.
      #
      # Only Go targets are built: building non-Go targets here would be wasted
      # work since CodeQL's Go extractor only processes Go compiler invocations.
      - name: Build (Go)
        if: matrix.language == 'go'
        run: |
          bazel build $(bazel query "kind('go_.*', //...)") \
            --spawn_strategy=local \
            --nouse_action_cache \
            --noremote_accept_cached \
            --noremote_upload_local_results

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
