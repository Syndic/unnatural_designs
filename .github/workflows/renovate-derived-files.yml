name: Renovate — re-derive lock files

# Renovate bumps the manifests (MODULE.bazel, pyproject.toml) but cannot regenerate the
# lock files they derive: both refreshes shell out to a build tool, and Mend-hosted
# Renovate gates those behind its `allowedUnsafeExecutions` allowlist (`bazelModDeps` is
# not allowed; `uv lock` likewise, so the pep621 manager falls back to `pip_requirements`
# text-editing `requirements_lock.txt` in place — an upgrade *signal*, not an
# authoritative resolution). Without this workflow every Renovate PR lands with stale
# derived files, and the committed copies drift further out of date over time.
#
# The refreshes live in one workflow for two reasons. Python and Bazel are *ordered*: uv must
# settle `requirements_lock.txt` before `bazel mod deps` regenerates MODULE.bazel.lock (whose
# pip `facts` derive from it). Go is independent of both, but rides the same job so every
# derived file lands in ONE commit — a grouped PR can bump Go, Python and Bazel together, and
# two workflows committing separately would race the `expectedHeadOid` the atomic mutation
# needs. Full rationale in the doc pointer below.
#
# The steps run in this order:
#   1. Classify which manifests the PR touched, so a Bazel-only PR skips uv setup.
#   2. Python: `meta/scripts/ratify_renovate_proposals.py` extracts Renovate's proposed
#      bumps from the diff, runs `uv lock --upgrade-package <each>`, re-exports
#      `requirements_lock.txt`, and reports which (if any) proposed bumps uv refused to
#      advance.
#   3. Bazel: `bazel mod deps --lockfile_mode=update`, run when MODULE.bazel or .bazelversion
#      moved, or the settled requirements_lock.txt differs from the base (a Python bump that
#      didn't move the lock leaves the pip facts valid and skips this), and gated on no ratify
#      conflicts — regenerating against a half-resolved tree is worse than leaving it a
#      round-trip stale. A .bazelversion bump matters because the lock's `lockFileVersion`
#      tracks the bazel release; bazelisk installs the bumped version, so the refresh rewrites
#      the lock in the new format.
#   4. Go: `go mod tidy` per workspace member, then `go work sync`, when a go.mod/go.work
#      moved. Renovate's `go get` bumps go.mod/go.sum but never tidies (opt-in) or syncs
#      (vendor-only in Renovate), so the indirect block and go.work.sum are left stale; this
#      settles them. Gated on no ratify conflicts so the Go files join the single commit.
#   5. No conflicts: commit every derived file in a single commit. Otherwise: reset
#      nothing (we won't silently revert Renovate's edit — the commit step is simply
#      skipped) and file a REQUEST_CHANGES review with the diagnosis. The review blocks
#      merge until dismissed; dismissal is the deliberate ack that the PR is unactionable
#      (close it) or that the conflicting constraint will be relaxed (push to the branch —
#      the workflow re-evaluates).
#
# Prior bot REQUEST_CHANGES reviews are dismissed after the new state lands (commit OR
# new review filed) so the PR's review status reflects the latest evaluation. Order is
# deliberate (commit/file first, then dismiss) so a partial workflow failure leaves the
# stale review intact rather than briefly clearing the gate.
#
# The data-manipulation logic is in Python scripts under tests — path classification in
# `//meta/scripts:test_classify_changed_paths`, proposal ratification in
# `//meta/scripts:test_ratify_renovate_proposals`. The workflow handles only the
# side-effecting steps that depend on Actions context — minting the app token, the GitHub
# API calls (review file + dismiss), and the composite action invocation for the commit.
#
# See .claude/CLAUDE.md "Renovate auto-commit helper" for the broader rationale.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      # Manifests only. `MODULE.bazel.lock` is absent deliberately: it is derived, nothing
      # but this workflow writes it, and a lock-only diff has nothing to regenerate.
      - "MODULE.bazel"
      # A bazel version bump re-derives the lock too: `lockFileVersion` and the recorded
      # extension shape track the bazel release, so a bumped `.bazelversion` leaves the
      # committed lock stale. CI hides that (`--lockfile_mode=update` rewrites in memory),
      # but the `bazel mod tidy` pre-commit hook rewrites it on disk and blocks the commit.
      - ".bazelversion"
      - "pyproject.toml"
      - "uv.lock"
      - "requirements_lock.txt"
      # Go: a Renovate bump always edits go.mod (and go.sum alongside it), so go.mod covers
      # every case; go.sum / go.work.sum are derived here (tidy/sync) and never the sole
      # trigger. go.work carries the go directive + workspace member list. `**/` catches the
      # per-module go.mod at any depth.
      - "**/go.mod"
      - "go.work"

permissions:
  contents: read

jobs:
  re-derive:
    name: Re-derive lock files
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.head_ref }}
          # Need the base ref reachable so the classify step and the ratify script can
          # diff against it. Shallow checkout (the default) only fetches the head commit.
          fetch-depth: 0
          persist-credentials: false

      # The meta/scripts this job runs via bare `python3` (classify_changed_paths.py, and
      # go_derived_files.py, which imports _workspace.py) are written for the repo's pinned
      # Python 3.14 — ruff (target-version = py314) enforces 3.14-only syntax like PEP 758's
      # parenthesis-less `except`. The runner's stock python3 lags 3.14 and SyntaxErrors on it,
      # so pin 3.14 the same way ci.yml / security.yml do. (The ratify step runs under `uv run`,
      # which already uses the 3.14 interpreter; this covers the bare-python3 steps.)
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          # renovate: datasource=python-version depName=python
          python-version: "3.14"

      # Classify what this PR changed into `python` / `bazel` / `go` outputs (three-dot diff
      # and the tested regexes live in the script). `bazel` means "an input that invalidates
      # MODULE.bazel.lock moved" — either MODULE.bazel (module graph) or .bazelversion (lock
      # format); both need the same refresh, so they share one output. Whether a Python change
      # ALSO needs a Bazel refresh is decided after ratify, by the requirements-lock check
      # below — a pyproject-only edit that doesn't move requirements_lock.txt leaves
      # MODULE.bazel.lock's pip `facts` valid and skips it.
      - name: Classify changed manifests
        id: changed
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          python3 meta/scripts/classify_changed_paths.py \
            --base "origin/${BASE_REF}" \
            --rule 'python=(^|/)(pyproject\.toml|uv\.lock|requirements_lock\.txt)$' \
            --rule 'bazel=(^|/)(MODULE\.bazel|\.bazelversion)$' \
            --rule 'go=(^|/)(go\.mod|go\.work)$'

      # ── Python: ratify Renovate's proposals via uv ────────────────────────────────
      # A skipped step's outputs are empty, so `steps.ratify.outputs.conflicts == ''`
      # reads as "no conflicts" on Bazel-only PRs — which is what the gates below want.

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        if: steps.changed.outputs.python == 'true'

      - name: Ratify Renovate's proposals via uv
        if: steps.changed.outputs.python == 'true'
        id: ratify
        env:
          BASE_REF: ${{ github.base_ref }}
        run: uv run python3 meta/scripts/ratify_renovate_proposals.py

      # ── Bazel: regenerate MODULE.bazel.lock against the settled requirements ──────

      # MODULE.bazel.lock's pip `facts` are stale iff the settled requirements_lock.txt
      # differs from the merge base (what the committed facts were built from). Compare the
      # post-ratify working tree to the merge base — not to HEAD: when Renovate's
      # pip_requirements fallback already bumped requirements_lock.txt at HEAD, ratify's
      # re-export matches HEAD (diff empty) yet the facts are still stale, so a HEAD compare
      # would wrongly skip the refresh. This is what makes a Python change conditionally
      # trigger the Bazel step (a pyproject-only edit that re-resolves the same is a no-op).
      # Only meaningful after a Python change (nothing else moves requirements_lock.txt); when
      # skipped, `moved` is empty and the Bazel gate below falls back to the `bazel` output.
      - name: Has requirements_lock.txt moved from the base?
        id: lock
        if: steps.changed.outputs.python == 'true'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          base=$(git merge-base "origin/${BASE_REF}" HEAD)
          if git diff --quiet "${base}" -- requirements_lock.txt; then
            echo "moved=false" >> "${GITHUB_OUTPUT}"
          else
            echo "moved=true" >> "${GITHUB_OUTPUT}"
          fi

      # Plain bazelisk install — no remote cache needed for `bazel mod deps`, which only
      # resolves module versions and writes the lock file. Avoids the BuildBuddy key
      # plumbing the main `setup-bazel-remote` composite action requires.
      #
      # These two cache flags are the only safe ones here. `bazel mod deps` refreshes the
      # pip extension's `facts` only when it re-evaluates the extension, which needs a cold
      # output base. Adding `disk-cache` or an output-base cache would make the refresh a
      # silent no-op: no diff to commit, job still green, MODULE.bazel.lock left stale.
      #
      # Runs when the `bazel` output fired (MODULE.bazel or .bazelversion moved) OR
      # requirements_lock.txt moved (parenthesized because GitHub Actions binds && tighter
      # than ||). Gated on no ratify conflicts either way. bazelisk reads the checked-out
      # .bazelversion, so a version bump regenerates the lock with the bumped bazel.
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        if: (steps.changed.outputs.bazel == 'true' || steps.lock.outputs.moved == 'true') && steps.ratify.outputs.conflicts == ''
        with:
          bazelisk-cache: true
          repository-cache: true

      - name: Re-update MODULE.bazel.lock
        if: (steps.changed.outputs.bazel == 'true' || steps.lock.outputs.moved == 'true') && steps.ratify.outputs.conflicts == ''
        run: bazel mod deps --lockfile_mode=update

      # ── Go: tidy each module and sync the workspace ───────────────────────────────
      # Renovate's gomod manager runs `go get`, which bumps go.mod/go.sum but never
      # `go mod tidy` (opt-in) or `go work sync` (vendor-only in Renovate) — so the indirect
      # block and go.work.sum are left stale, and Mend-hosted Renovate can't run either anyway
      # (the same allowedUnsafeExecutions gate as uv/Bazel). We tidy each workspace member,
      # then sync once; both target lists come from go.work via go_derived_files.py, so a new
      # module is picked up without touching this workflow. A tidy that fails on a genuinely
      # inconsistent bump fails the job — the right signal that the PR isn't mergeable as-is.
      # Gated on no ratify conflicts so Go's derived files ride the single commit below (a
      # separate commit would race the `expectedHeadOid` the atomic mutation relies on).
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        if: steps.changed.outputs.go == 'true' && steps.ratify.outputs.conflicts == ''
        with:
          go-version-file: go.work
          # No module cache: this is a metadata-only tidy, not a build, so the cache would save
          # little and a workspace cache-dependency-path is the only thing it needs configured.
          cache: false

      - name: Tidy Go modules and sync the workspace
        id: gotidy
        if: steps.changed.outputs.go == 'true' && steps.ratify.outputs.conflicts == ''
        run: |
          set -euo pipefail
          while IFS= read -r mod; do
            echo "::group::go mod tidy (${mod})"
            (cd "${mod}" && go mod tidy)
            echo "::endgroup::"
          done < <(python3 meta/scripts/go_derived_files.py --what modules)
          go work sync
          # Hand the commit step the exact derived-file set (each module's go.mod/go.sum plus
          # go.work.sum); the action diff-checks each and commits only what tidy/sync moved.
          {
            echo "files<<EOF"
            python3 meta/scripts/go_derived_files.py --what files
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RENOVATE_HELPER_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_HELPER_PRIVATE_KEY }}

      # ── Conflict path ────────────────────────────────────────────────────────────
      # File a REQUEST_CHANGES review with the diagnosis the script produced. The
      # working tree's partial uv resolution is intentionally left alone — the commit
      # step below is gated by `conflicts == ''`, and no later step reads the tree, so
      # the runner just discards it when the job ends.

      - name: File REQUEST_CHANGES review
        if: steps.ratify.outputs.conflicts != ''
        id: file-review
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CONFLICTS: ${{ steps.ratify.outputs.conflicts }}
        run: |
          set -euo pipefail
          BODY=$(cat <<EOF
          \`uv lock\` would not advance the following packages to the versions Renovate proposed:

          \`\`\`
          ${CONFLICTS}
          \`\`\`

          A workspace constraint is holding them at their current versions. Likely sources:
          - An explicit upper bound in \`pyproject.toml\` or a workspace member's \`pyproject.toml\`
          - A transitive constraint pinning the package below the proposed version
          - A platform marker excluding the proposed version

          Not committing the revert — that would silently erase Renovate's signal. Dismiss this review when ready: either close this PR (the bump is genuinely impossible) or relax the conflicting constraint and push to the branch (the workflow will re-evaluate).
          EOF
          )
          # Capture the new review's ID so the dismiss step below can exclude it from
          # the "prior reviews" set it dismisses.
          NEW_ID=$(gh api "repos/${REPO}/pulls/${PR}/reviews" \
            -f event=REQUEST_CHANGES \
            -f body="${BODY}" \
            -f commit_id="${HEAD_SHA}" \
            --jq '.id')
          echo "review-id=${NEW_ID}" >> "${GITHUB_OUTPUT}"

      # ── Success path ─────────────────────────────────────────────────────────────
      # One commit for every derived file. The composite action diff-checks each path
      # independently and skips the unchanged ones, so a Bazel-only PR commits only
      # MODULE.bazel.lock; if nothing changed at all (e.g. a re-run on an already-honored
      # PR) the whole step is a clean no-op. The Go paths come from the gotidy step's output
      # (empty when the PR touched no go.mod); the action ignores the resulting blank lines.

      - name: Commit re-derived lock files
        if: steps.ratify.outputs.conflicts == ''
        uses: ./.github/actions/commit-file-via-app
        with:
          client-id: ${{ vars.RENOVATE_HELPER_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_HELPER_PRIVATE_KEY }}
          branch: ${{ github.head_ref }}
          file-paths: |
            uv.lock
            requirements_lock.txt
            MODULE.bazel.lock
            ${{ steps.gotidy.outputs.files }}
          commit-message: "chore(deps): re-derive lock files"

      # ── Dismiss prior bot reviews ───────────────────────────────────────────────
      # Runs after the success or conflict path so we never briefly clear the gate
      # before the new state is in place. The conflict path passes the just-filed
      # review ID via `file-review.outputs.review-id`; the filter excludes that ID so
      # we don't dismiss our own fresh review. In the success path the input is empty
      # and every active bot CHANGES_REQUESTED review is fair game.
      #
      # The bot login string is the same one tracked by `gitIgnoredAuthors` in
      # renovate.json; if the helper app is recreated, both values need to be updated
      # together (see .claude/CLAUDE.md "Renovate auto-commit helper").

      - name: Dismiss prior bot CHANGES_REQUESTED reviews
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          EXCLUDE_ID: ${{ steps.file-review.outputs.review-id }}
          DISMISS_MESSAGE: ${{ steps.ratify.outputs.conflicts == '' && 'Resolved by fresh evaluation.' || 'Superseded by fresh evaluation.' }}
        run: |
          set -euo pipefail
          BASE_FILTER='.user.login == "unnatural-designs-renovate-helper[bot]" and .state == "CHANGES_REQUESTED"'
          if [ -n "${EXCLUDE_ID}" ]; then
            JQ_FILTER=".[] | select(${BASE_FILTER} and .id != ${EXCLUDE_ID}) | .id"
          else
            JQ_FILTER=".[] | select(${BASE_FILTER}) | .id"
          fi
          REVIEWS=$(gh api "repos/${REPO}/pulls/${PR}/reviews" --jq "${JQ_FILTER}")
          while IFS= read -r review_id; do
            [ -z "${review_id}" ] && continue
            gh api -X PUT \
              "repos/${REPO}/pulls/${PR}/reviews/${review_id}/dismissals" \
              -f message="${DISMISS_MESSAGE}" \
              -f event=DISMISS
          done <<< "${REVIEWS}"
