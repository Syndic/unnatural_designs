name: Self-test — commit-file-via-app

# The commit-file-via-app composite action has consumers outside this repo that reference it at
# `@main` (see the action's README for the contract and consumer list), so a breaking change here
# ships to them with no review gate. This workflow exercises the action end-to-end on every PR
# that touches it, against a scratch branch, covering each clause of that contract in turn:
#
#   1. a changed file is committed, web-flow signed, with the expected content;
#   2. no changed files is a clean no-op — the branch tip does not move;
#   3. given several paths of which only some changed, only the changed ones are committed.
#
# Case 3 is the shape `renovate-requirements-lock.yml` hits whenever `uv.lock` and
# `requirements_lock.txt` don't both move. The scratch branch is deleted even on failure.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - ".github/actions/commit-file-via-app/**"
      - ".github/workflows/commit-file-via-app-selftest.yml"

permissions:
  contents: read

jobs:
  selftest:
    name: Action self-test
    # Fork PRs can't read the app credentials; skip rather than fail confusingly.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      # run_attempt guards against a leftover branch from a prior attempt whose cleanup failed.
      SCRATCH_BRANCH: action-selftest/${{ github.run_id }}-${{ github.run_attempt }}
      # Second path for the partial-diff case: tracked, and deliberately never modified.
      UNCHANGED_PATH: docs/future-considerations.md
      # Written into README.md, then grepped back out of the committed blob to prove the commit
      # carries the content we staged; run_id + run_attempt keep them unique per run.
      COMMIT_MARKER: selftest commit ${{ github.run_id }}-${{ github.run_attempt }}
      PARTIAL_MARKER: selftest partial-diff ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      # The action mints its own token from these credentials; this one is for the scratch-branch
      # setup, assertions, and cleanup around it.
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RENOVATE_HELPER_APP_ID }}
          private-key: ${{ secrets.RENOVATE_HELPER_PRIVATE_KEY }}

      # Branch from the local HEAD (not the PR head SHA from the event payload) so the remote
      # scratch branch is guaranteed to match the working tree the action diffs against.
      - name: Create scratch branch at the checked-out commit
        id: scratch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BASE_SHA=$(git rev-parse HEAD)
          gh api "repos/${REPO}/git/refs" \
            -f ref="refs/heads/${SCRATCH_BRANCH}" \
            -f sha="${BASE_SHA}"
          echo "base-sha=${BASE_SHA}" >> "${GITHUB_OUTPUT}"

      # Must touch a *tracked* file — the action's diff check is `git diff`, which is blind to
      # untracked paths.
      - name: Modify a tracked file in the working tree
        run: echo "${COMMIT_MARKER}" >> README.md

      - name: Commit the change via the action
        uses: ./.github/actions/commit-file-via-app
        with:
          app-id: ${{ vars.RENOVATE_HELPER_APP_ID }}
          private-key: ${{ secrets.RENOVATE_HELPER_PRIVATE_KEY }}
          branch: ${{ env.SCRATCH_BRANCH }}
          file-paths: |
            README.md
          commit-message: "test: commit-file-via-app self-test"

      - name: Assert a signed commit landed with the expected content
        id: assert-commit
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ steps.scratch.outputs.base-sha }}
        run: |
          set -euo pipefail
          # The REST refs read is eventually consistent with the GraphQL mutation the action just
          # made: a read milliseconds later can still return the pre-commit tip. Poll rather than
          # assert on the first response, or this races and fails for the wrong reason.
          TIP=$(gh api "repos/${REPO}/git/ref/heads/${SCRATCH_BRANCH}" --jq .object.sha)
          for _ in $(seq 30); do
            if [ "${TIP}" != "${BASE_SHA}" ]; then break; fi
            sleep 1
            TIP=$(gh api "repos/${REPO}/git/ref/heads/${SCRATCH_BRANCH}" --jq .object.sha)
          done
          if [ "${TIP}" = "${BASE_SHA}" ]; then
            echo "FAIL: branch tip did not move after 30s — the action committed nothing"
            exit 1
          fi
          COMMIT=$(gh api "repos/${REPO}/commits/${TIP}")
          PARENT=$(jq -r '.parents[0].sha' <<< "${COMMIT}")
          if [ "${PARENT}" != "${BASE_SHA}" ]; then
            echo "FAIL: tip's parent is ${PARENT}, expected the scratch base ${BASE_SHA}"
            exit 1
          fi
          VERIFIED=$(jq -r '.commit.verification.verified' <<< "${COMMIT}")
          if [ "${VERIFIED}" != "true" ]; then
            echo "FAIL: commit is not web-flow signed (verification.verified=${VERIFIED})"
            exit 1
          fi
          if ! gh api "repos/${REPO}/contents/README.md?ref=${SCRATCH_BRANCH}" --jq .content \
              | base64 -d | grep -qF "${COMMIT_MARKER}"; then
            echo "FAIL: committed README.md is missing the selftest marker"
            exit 1
          fi
          echo "tip=${TIP}" >> "${GITHUB_OUTPUT}"

      # Restore the working tree so the second action run sees no diff.
      - name: Revert the working-tree change
        run: git checkout -- README.md

      - name: Run the action again with no diff
        uses: ./.github/actions/commit-file-via-app
        with:
          app-id: ${{ vars.RENOVATE_HELPER_APP_ID }}
          private-key: ${{ secrets.RENOVATE_HELPER_PRIVATE_KEY }}
          branch: ${{ env.SCRATCH_BRANCH }}
          file-paths: |
            README.md
          commit-message: "test: this commit must never land (no-diff no-op)"

      - name: Assert the no-diff run was a no-op
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          EXPECTED_TIP: ${{ steps.assert-commit.outputs.tip }}
        run: |
          set -euo pipefail
          # Polling can't help a negative assertion, and the same read-after-write lag would hide
          # a wrongly-created commit behind a stale tip. Settle so a regression has time to show.
          sleep 10
          TIP=$(gh api "repos/${REPO}/git/ref/heads/${SCRATCH_BRANCH}" --jq .object.sha)
          if [ "${TIP}" != "${EXPECTED_TIP}" ]; then
            echo "FAIL: branch tip moved on a no-diff run (${EXPECTED_TIP} -> ${TIP})"
            exit 1
          fi

      - name: Modify only one of the two tracked files
        run: echo "${PARTIAL_MARKER}" >> README.md

      - name: Commit both paths via the action, only one of them changed
        uses: ./.github/actions/commit-file-via-app
        with:
          app-id: ${{ vars.RENOVATE_HELPER_APP_ID }}
          private-key: ${{ secrets.RENOVATE_HELPER_PRIVATE_KEY }}
          branch: ${{ env.SCRATCH_BRANCH }}
          file-paths: |
            README.md
            ${{ env.UNCHANGED_PATH }}
          commit-message: "test: commit-file-via-app partial-diff self-test"

      # An unchanged file wrongly included in `additions` yields an identical tree, so that stays
      # invisible here; what this catches is no commit at all, wrong content, or a rewritten path.
      - name: Assert only the changed path was committed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          EXPECTED_PARENT: ${{ steps.assert-commit.outputs.tip }}
        run: |
          set -euo pipefail
          # Poll for the same read-after-write lag as the first assertion.
          TIP=$(gh api "repos/${REPO}/git/ref/heads/${SCRATCH_BRANCH}" --jq .object.sha)
          for _ in $(seq 30); do
            if [ "${TIP}" != "${EXPECTED_PARENT}" ]; then break; fi
            sleep 1
            TIP=$(gh api "repos/${REPO}/git/ref/heads/${SCRATCH_BRANCH}" --jq .object.sha)
          done
          if [ "${TIP}" = "${EXPECTED_PARENT}" ]; then
            echo "FAIL: branch tip did not move after 30s — the action skipped a changed file"
            exit 1
          fi
          COMMIT=$(gh api "repos/${REPO}/commits/${TIP}")
          PARENT=$(jq -r '.parents[0].sha' <<< "${COMMIT}")
          if [ "${PARENT}" != "${EXPECTED_PARENT}" ]; then
            echo "FAIL: tip's parent is ${PARENT}, expected ${EXPECTED_PARENT}"
            exit 1
          fi
          TOUCHED=$(jq -r '[.files[].filename] | sort | join(",")' <<< "${COMMIT}")
          if [ "${TOUCHED}" != "README.md" ]; then
            echo "FAIL: commit touched [${TOUCHED}], expected only README.md"
            echo "      (${UNCHANGED_PATH} had no diff and must not be rewritten)"
            exit 1
          fi
          if ! gh api "repos/${REPO}/contents/README.md?ref=${SCRATCH_BRANCH}" --jq .content \
              | base64 -d | grep -qF "${PARTIAL_MARKER}"; then
            echo "FAIL: committed README.md is missing the partial-diff marker"
            exit 1
          fi

      - name: Delete scratch branch
        if: always() && steps.scratch.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: gh api -X DELETE "repos/${REPO}/git/refs/heads/${SCRATCH_BRANCH}"
