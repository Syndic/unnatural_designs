name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 02:00 UTC
    - cron: "0 2 * * 1"

jobs:
  # ── Monorepo Structure Maintenance ────────────────────────────────────────────
  # Checks that per-language tooling is fully wired up before per-module jobs run. Currently covers
  # Go (module matrix completeness, .golangci.yml presence).
  # TEND(lang-expand): add an equivalent completeness check for each adopted language
  #   (e.g. verify pyproject.toml/ruff.toml present for Python modules).
  go-modules-check:
    name: Go module completeness check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 meta/scripts/check_go_modules.py

  # ── Static Application Security Testing (SAST) ───────────────────────────────
  # Analyses source code for security vulnerabilities — injection flaws, insecure API usage,
  # hardcoded secrets — without running or building the code. Semgrep uses per-language rule packs;
  # add one per adopted language.
  # TEND(lang-expand): add p/<language> for each adopted language (semgrep.dev/r lists available
  #   packs, e.g. p/java, p/typescript, p/rust).
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/golang
            p/python
            p/secrets

  # ── Dependency CVE Scanning ───────────────────────────────────────────────────
  # Checks whether the code calls into known-vulnerable dependency code paths, not just whether a
  # vulnerable package is present (lower noise than pure manifest scanning). Runs once per module.
  # Currently covers Go via govulncheck.
  # TEND(lang-expand): add an equivalent per-language scanner as languages are adopted
  #   (e.g. pip-audit for Python, cargo-audit for Rust, trivy fs --scanners vuln
  #   for languages without a dedicated reachability tool).
  govulncheck:
    name: govulncheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: [go-modules-check]
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module:
          - tools/network_infrastructure_maintenance
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: golang/govulncheck-action@31f7c5463448f83528bd771c2d978d940080c9fd # v1.0.4
        with:
          work-dir: ${{ matrix.module }}
          # Match the toolchain pinned in go.work so workspace-level `go X.Y.Z`
          # directives don't trip GOTOOLCHAIN=local. Without this the action
          # defaults to "stable", which lags behind patch bumps.
          go-version-file: go.work

  govulncheck-all:
    name: govulncheck (all modules)
    runs-on: ubuntu-latest
    needs: [govulncheck]
    if: always()
    steps:
      - name: Verify all govulncheck jobs passed
        run: |
          if [ "${{ needs.govulncheck.result }}" != "success" ]; then
            echo "govulncheck result: ${{ needs.govulncheck.result }}"
            exit 1
          fi
          echo "All govulncheck jobs passed"

  # ── Supply Chain and Filesystem Scanning ─────────────────────────────────────
  # Scans the entire repository for secrets committed to source, dependency CVEs across all
  # ecosystems, and license compliance. Language-agnostic — Trivy covers new languages automatically
  # as they are added.
  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy
