name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gazelle-check:
    name: Gazelle BUILD file check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bazel-remote
        with: 
          buildbuddy-api-key: ${{ secrets.BUILDBUDDY_API_KEY }}
      - run: bazel run --config=remote //:gazelle -- -mode=diff

  go-work-check:
    name: go.work consistency/completeness check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 meta/scripts/check_go_work.py

  python-scale-check:
    name: Python scale check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 meta/scripts/check_python_scale.py

  go-modules-check:
    name: Go module completeness check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 meta/scripts/check_go_modules.py

  golangci-lint:
    name: golangci-lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: [go-modules-check]
    strategy:
      fail-fast: false
      matrix:
        module:
          - tools/network_infrastructure_maintenance
    steps:
      - uses: actions/checkout@v6

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          working-directory: ${{ matrix.module }}

  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    needs: [gazelle-check, go-work-check, python-scale-check, go-modules-check]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bazel-remote
        with:
          buildbuddy-api-key: ${{ secrets.BUILDBUDDY_API_KEY }}
      - run: bazel test --config=remote //...
