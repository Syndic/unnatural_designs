name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gazelle-check:
    name: Gazelle check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - run: bazel run //:gazelle -- -mode=diff

  go-work-check:
    name: go.work consistency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 meta/scripts/check_go_work.py

  python-scale-check:
    name: Python scale check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 meta/scripts/check_python_scale.py

  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    needs: [gazelle-check, go-work-check, python-scale-check]
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - run: bazel test //...
